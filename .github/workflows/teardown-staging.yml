name: Teardown Staging

on:
  workflow_dispatch:

permissions: {}

jobs:
  teardown:
    environment: staging
    if: github.repository_owner != 'fastapi'
    runs-on:
      - self-hosted
      - staging
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: touch .env
      - run: docker compose -f compose.yml --project-name ${{ secrets.STACK_NAME_STAGING }} down -v
